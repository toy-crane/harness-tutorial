version: 1

scenarios:
  - id: "KANBAN-001"
    name: "카드 추가"
    given: "Todo 칼럼이 비어 있다"
    when: "제목을 입력하고 카드 추가 버튼을 클릭한다"
    then: "Todo 칼럼에 새 카드가 표시된다"
    examples:
      - input: { title: "회의록 작성" }
        expect: { cardText: "회의록 작성", columnId: "todo", cardCount: 1 }
      - input: { title: "" }
        expect: { errorMessage: "제목을 입력해주세요", cardCount: 0 }

  - id: "KANBAN-002"
    name: "카드 삭제"
    given: "Todo 칼럼에 카드 '회의록 작성'이 있다"
    when: "카드의 삭제 버튼을 클릭한다"
    then: "확인 대화상자가 표시된다"
    examples:
      - input: { action: "delete-click" }
        expect: { confirmDialog: true, confirmMessage: "정말 삭제하시겠습니까?" }
      - input: { action: "confirm-delete" }
        expect: { cardVisible: false, cardCount: 0 }
      - input: { action: "cancel-delete" }
        expect: { cardVisible: true, cardCount: 1 }

  - id: "KANBAN-003"
    name: "카드 편집 모달"
    given: "Todo 칼럼에 카드 '회의록 작성'이 있다"
    when: "카드를 클릭한다"
    then: "편집 모달이 열리고 모든 필드를 수정할 수 있다"
    examples:
      - input: { action: "click-card" }
        expect: { modalVisible: true }
      - input: { title: "주간 보고서" }
        expect: { cardText: "주간 보고서" }
      - input: { priority: "High" }
        expect: { priorityColor: "red" }

  - id: "KANBAN-004"
    name: "드래그&드롭 칼럼 간 이동"
    given: "Todo 칼럼에 카드 '회의록 작성'이 있다"
    when: "카드를 In Progress 칼럼으로 드래그&드롭한다"
    then: "카드가 In Progress 칼럼으로 이동한다"
    examples:
      - input: { dragFrom: "todo", dropTo: "in-progress", card: "회의록 작성" }
        expect: { todoCards: [], inProgressCards: ["회의록 작성"] }

  - id: "KANBAN-005"
    name: "드래그&드롭 칼럼 내 순서 변경"
    given: "Todo 칼럼에 카드 A, B, C가 순서대로 있다"
    when: "카드 A를 카드 C 아래로 드래그&드롭한다"
    then: "카드 순서가 B, C, A로 변경된다"
    examples:
      - input: { column: "todo", dragCard: "A", dropAfter: "C" }
        expect: { todoCards: ["B", "C", "A"] }

  - id: "KANBAN-006"
    name: "우선순위 색상 구분"
    given: "카드에 우선순위가 설정되어 있다"
    when: "보드를 확인한다"
    then: "우선순위별로 다른 색상이 표시된다"
    examples:
      - input: { priority: "High" }
        expect: { priorityColor: "red" }
      - input: { priority: "Medium" }
        expect: { priorityColor: "yellow" }
      - input: { priority: "Low" }
        expect: { priorityColor: "green" }

  - id: "KANBAN-007"
    name: "태그 관리"
    given: "카드 편집 모달이 열려 있다"
    when: "태그를 추가한다"
    then: "카드에 태그가 표시된다"
    examples:
      - input: { tags: ["버그"] }
        expect: { visibleTags: ["버그"] }
      - input: { tags: ["디자인", "기능"] }
        expect: { visibleTags: ["디자인", "기능"] }

  - id: "KANBAN-008"
    name: "마감일 경과 경고"
    given: "카드에 마감일이 설정되어 있다"
    when: "마감일이 오늘보다 이전이다"
    then: "카드에 빨간 테두리 경고가 표시된다"
    examples:
      - input: { dueDate: "2026-03-01" }
        expect: { overdueWarning: true }
      - input: { dueDate: "2026-03-20" }
        expect: { overdueWarning: false }

  - id: "KANBAN-009"
    name: "서브태스크 진행률"
    given: "카드에 서브태스크가 있다"
    when: "서브태스크를 추가하거나 토글한다"
    then: "카드에 진행률이 표시된다"
    examples:
      - input: { subtasks: ["디자인 검토", "코드 리뷰"], checked: [] }
        expect: { progressText: "0/2" }
      - input: { subtasks: ["디자인 검토", "코드 리뷰"], checked: ["디자인 검토"] }
        expect: { progressText: "1/2" }
      - input: { subtasks: ["코드 리뷰"], checked: ["코드 리뷰"] }
        expect: { progressText: "1/1" }

  - id: "KANBAN-010"
    name: "제목 검색"
    given: "보드에 '회의록 작성', '주간 보고서', '버그 수정' 카드가 있다"
    when: "검색창에 텍스트를 입력한다"
    then: "제목에 해당 텍스트가 포함된 카드만 표시된다"
    examples:
      - input: { searchQuery: "회의" }
        expect: { visibleCards: ["회의록 작성"] }
      - input: { searchQuery: "" }
        expect: { visibleCards: ["회의록 작성", "주간 보고서", "버그 수정"] }

  - id: "KANBAN-011"
    name: "우선순위·태그 필터링"
    given: "보드에 다양한 우선순위와 태그의 카드가 있다"
    when: "필터를 선택한다"
    then: "조건에 맞는 카드만 표시된다"
    examples:
      - input: { filterPriority: "High" }
        expect: { allVisibleCardsPriority: "High" }
      - input: { filterTag: "버그" }
        expect: { allVisibleCardsHaveTag: "버그" }
      - input: { filterPriority: null, filterTag: null }
        expect: { allCardsVisible: true }

  - id: "KANBAN-012"
    name: "다크모드 토글"
    given: "라이트 모드가 적용되어 있다"
    when: "다크모드 토글을 클릭한다"
    then: "다크 모드로 전환되고 새로고침 후에도 유지된다"
    examples:
      - input: { action: "toggle-dark" }
        expect: { theme: "dark" }
      - input: { action: "reload-page" }
        expect: { theme: "dark" }

  - id: "KANBAN-013"
    name: "데이터 내보내기"
    given: "보드에 카드가 있다"
    when: "내보내기 버튼을 클릭한다"
    then: "JSON 파일이 다운로드된다"
    examples:
      - input: { action: "export" }
        expect: { fileDownloaded: true, fileFormat: "json" }

  - id: "KANBAN-014"
    name: "데이터 가져오기 (덮어쓰기)"
    given: "보드에 기존 카드가 있다"
    when: "JSON 파일을 가져오기한다"
    then: "기존 데이터가 덮어써지고 가져온 데이터로 교체된다"
    examples:
      - input: { importFile: "valid-board.json" }
        expect: { boardReplaced: true, previousCardsVisible: false }

  - id: "KANBAN-015"
    name: "데이터 영속성"
    given: "보드에 카드를 추가한 상태이다"
    when: "페이지를 새로고침한다"
    then: "보드 상태가 그대로 유지된다"
    examples:
      - input: { action: "add-card-then-reload", title: "테스트 카드" }
        expect: { cardVisible: true, cardText: "테스트 카드" }
