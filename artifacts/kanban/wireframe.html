<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe: kanban</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --w-bg: #f5f5f5;
    --w-border: #ccc;
    --w-text: #555;
    --w-muted: #aaa;
    --w-fill: #eee;
  }
  * { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; color: var(--w-text); }
  body { background: var(--w-bg); }
  nav { position: sticky; top: 0; z-index: 40; background: var(--w-bg); border-bottom: 1px solid var(--w-border); }
  nav button { cursor: pointer; font-size: 13px; }
  nav button:hover { background: var(--w-fill); border-radius: 4px; }
  nav button.active { font-weight: bold; border-bottom: 2px solid var(--w-text); }
  .screen { display: none; }
  .screen.active { display: block; }
</style>
</head>
<body class="p-0 m-0">
<nav class="flex items-center gap-4 px-6 py-2">
  <span class="text-xs" style="color:var(--w-muted)">wireframe</span>
  <button id="nav-board" onclick="show('board')">Board</button>
</nav>
<div id="screen-board" class="screen p-6">
  <h1 class="text-lg font-bold mb-4">Kanban Board (Hot Reload Test!)</h1>
  <div class="flex gap-4">
    <div class="flex-1 border rounded p-4" style="border-color:var(--w-border)">
      <h2 class="font-bold mb-2">할 일</h2>
      <div class="border rounded p-2 mb-2" style="border-color:var(--w-border);background:var(--w-fill)">기본 Task 1</div>
      <div class="border rounded p-2 mb-2" style="border-color:var(--w-border);background:var(--w-fill)">Sample Task 3</div>
      <button class="text-sm" style="color:var(--w-muted)">+ Add</button>
    </div>
    <div class="flex-1 border rounded p-4" style="border-color:var(--w-border)">
      <h2 class="font-bold mb-2">진행 중</h2>
      <div class="border rounded p-2 mb-2" style="border-color:var(--w-border);background:var(--w-fill)">Sample Task 2</div>
    </div>
    <div class="flex-1 border rounded p-4" style="border-color:var(--w-border)">
      <h2 class="font-bold mb-2">완료</h2>
    </div>
  </div>
</div>
<script>
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + id).classList.add('active');
}
document.addEventListener('DOMContentLoaded', function() {
  var first = document.querySelector('nav button');
  if (first) first.click();
});
</script>
</body>
</html>
