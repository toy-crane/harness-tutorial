<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe: {{FEATURE_NAME}}</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --w-bg: #f5f5f5;
    --w-border: #ccc;
    --w-text: #555;
    --w-muted: #aaa;
    --w-fill: #eee;
  }

  * {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    color: var(--w-text);
  }

  body { background: var(--w-bg); }

  /* Screen nav */
  nav { position: sticky; top: 0; z-index: 40; background: var(--w-bg); border-bottom: 1px solid var(--w-border); }
  nav button { cursor: pointer; font-size: 13px; }
  nav button:hover { background: var(--w-fill); border-radius: 4px; }
  nav button.active { font-weight: bold; border-bottom: 2px solid var(--w-text); }

  .screen { display: none; }
  .screen.active { display: block; }
</style>
</head>
<body class="p-0 m-0">

<nav class="flex items-center gap-4 px-6 py-2">
  <span class="text-xs" style="color:var(--w-muted)">wireframe</span>
  <!-- NAV_BUTTONS -->
</nav>

<!-- SCREEN_CONTENT -->

<script>
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + id).classList.add('active');
}
// Activate first screen on load
document.addEventListener('DOMContentLoaded', function() {
  var first = document.querySelector('nav button');
  if (first) first.click();
});
</script>
</body>
</html>
